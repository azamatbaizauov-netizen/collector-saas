# Прод-стек пилота. Развёрнут на ОБЩЕМ VPS рядом с другими проектами.
# Host-nginx занимает 80/443 и фронтит всё; наш api публикуется только на
# 127.0.0.1:3001, host-nginx проксирует на него debitor.aibuhgalter.kz (+ certbot TLS).
# Caddy убран намеренно — он бы конфликтовал с host-nginx на 80/443.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: saas_opt
      POSTGRES_USER: saas_opt
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saas_opt -d saas_opt"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: saas-opt
    restart: unless-stopped
    command: ["node", "apps/api/dist/index.js"]
    env_file: .env
    environment:
      NODE_ENV: production
      TZ: Asia/Almaty
      PORT: "3001"
      HOST: "0.0.0.0"
      DATABASE_URL: "postgresql://saas_opt:${POSTGRES_PASSWORD}@postgres:5432/saas_opt?schema=public"
      REDIS_URL: "redis://redis:6379"
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 6

  worker:
    image: saas-opt
    restart: unless-stopped
    command: ["node", "apps/worker/dist/index.js"]
    env_file: .env
    environment:
      NODE_ENV: production
      TZ: Asia/Almaty
      DATABASE_URL: "postgresql://saas_opt:${POSTGRES_PASSWORD}@postgres:5432/saas_opt?schema=public"
      REDIS_URL: "redis://redis:6379"
      GOOGLE_APPLICATION_CREDENTIALS: "/secrets/google.json"
    volumes:
      - ./secrets/google.json:/secrets/google.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
